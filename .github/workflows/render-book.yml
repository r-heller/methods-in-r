name: Render and deploy book

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            bookdown
            rmarkdown
            knitr
            sessioninfo
            bslib
            downlit
            xml2
            htmltools
            tinytex

      - name: Install TinyTeX
        run: Rscript -e 'tinytex::install_tinytex(force = TRUE, bundle = "TinyTeX")'

      - name: Render book (HTML + PDF + EPUB)
        run: Rscript -e 'bookdown::render_book("index.Rmd", output_format = "all")'

      - name: Render per-chapter PDFs
        run: Rscript scripts/render-chapter-pdfs.R
        continue-on-error: true

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs
