name: Render and deploy book

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            bookdown
            rmarkdown
            knitr
            sessioninfo
            bslib
            downlit
            xml2
            htmltools
            tinytex

      - name: Install TinyTeX
        run: Rscript -e 'tinytex::install_tinytex(force = TRUE, bundle = "TinyTeX")'

      - name: Install LaTeX packages needed by preamble
        run: |
          Rscript -e 'tinytex::tlmgr_install(c(
            "hyperref","xcolor","microtype","booktabs","longtable","float",
            "fontspec","unicode-math","xunicode","euenc","tipa","tex-gyre",
            "amsmath","amssymb","mathtools","etoolbox","iftex","l3backend",
            "l3kernel","l3packages","fancyvrb","framed","ulem","upquote",
            "url","koma-script","mdwtools","ec","cm-super","lm","lm-math",
            "tools","caption","subcaption","listings","textcomp","grfext",
            "geometry","setspace","titling","environ","pdftexcmds",
            "infwarerr","kvoptions","ltxcmds","epstopdf-pkg","graphics",
            "graphics-def","oberdiek","colortbl","array","multirow",
            "wrapfig","tabu","threeparttable","threeparttablex","makecell",
            "ragged2e","filehook","footnote","filehook","makeindex"
          ), force = FALSE)'
        continue-on-error: true

      - name: Render HTML
        run: Rscript -e 'bookdown::render_book("index.Rmd", output_format = "bookdown::gitbook")'

      - name: Render EPUB
        run: Rscript -e 'bookdown::render_book("index.Rmd", output_format = "bookdown::epub_book")'
        continue-on-error: true

      - name: Render PDF
        run: Rscript -e 'bookdown::render_book("index.Rmd", output_format = "bookdown::pdf_book")'
        continue-on-error: true

      - name: Render per-chapter PDFs
        run: Rscript scripts/render-chapter-pdfs.R
        continue-on-error: true

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs
