name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      # Method pages use plain ```r code blocks; labs were converted to
      # the same form by `scripts/static_labs.py` (see MIGRATION_LOG).
      # Nothing here invokes the knitr engine, so R / renv are not needed.
      - name: Render HTML
        env:
          # The book has ~680 chapters, which pushes the default 8 GB
          # deno heap during the final book-assembly step. Lift the V8
          # old-space cap to 14 GB to fit on the standard ubuntu-latest
          # runner (16 GB RAM).
          QUARTO_DENO_V8_OPTIONS: "--max-old-space-size=14336"
        run: quarto render --to html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
