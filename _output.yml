bookdown::gitbook:
  css: style/style.css
  includes:
    in_header: style/header.html
    after_body: style/per-chapter-pdf-button.html
  split_by: chapter
  split_bib: no
  config:
    toc:
      collapse: section
      scroll_highlight: yes
      before: |
        <li><a href="./">Methods in R</a></li>
    toolbar:
      position: fixed
    edit:
      link: https://github.com/r-heller/methods-in-r/edit/main/%s
      text: "Edit"
    download: ["pdf", "epub"]
    sharing:
      facebook: no
      twitter: no
      linkedin: no
      weibo: no
      instapaper: no
      vk: no
      whatsapp: no
      all: ["github"]

bookdown::pdf_book:
  latex_engine: xelatex
  citation_package: natbib
  keep_tex: false
  toc_depth: 3
  includes:
    in_header: style/preamble.tex
  pandoc_args: ["--top-level-division=chapter"]

bookdown::epub_book:
  cover_image: "images/cover.png"
  stylesheet: style/style.css
  toc_depth: 3
