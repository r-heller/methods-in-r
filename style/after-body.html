<!-- Dark / light mode toggle (replaces Harrer's emoji with a Font Awesome glyph) -->
<div class="sticky-item">
  <button type="button" id="mode-switch" class="btn-circle-mode" aria-label="Toggle dark mode">
    <i class="fa-solid fa-circle-half-stroke" aria-hidden="true"></i>
  </button>
</div>

<script>
  (function () {
    var stored = localStorage.getItem('themeMode');
    var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    var initial = stored || (prefersDark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', initial);

    document.addEventListener('DOMContentLoaded', function () {
      var btn = document.getElementById('mode-switch');
      if (!btn) return;
      btn.addEventListener('click', function () {
        var current = document.documentElement.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('themeMode', next);
      });
    });
  })();
</script>

<!-- Left-sidebar Part dividers (bookdown's native (PART) is broken on bs4_book 0.46) -->
<script>
  document.addEventListener("DOMContentLoaded", function () {
    var toc = document.querySelector(".book-toc");
    if (!toc) return;

    var parts = [
      { before: "sec-ch-01-foundations.html",  roman: "Part I",   title: "Foundations" },
      { before: "sec-ch-07-regression.html",   roman: "Part II",  title: "Modelling" },
      { before: "sec-ch-12-bioinformatics.html",roman: "Part III", title: "Applications" },
      { before: "reporting-templates.html",    roman: "Part IV",  title: "Reporting Templates" },
      { before: "the-research-workflow.html",  roman: "Appendix", title: "Reference Material" }
    ];

    parts.forEach(function (p) {
      var anchor = toc.querySelector('a[href="' + p.before + '"]');
      if (!anchor) return;
      var li = anchor.closest("li");
      if (!li || li.previousElementSibling && li.previousElementSibling.classList.contains("part-header")) return;
      var hdr = document.createElement("li");
      hdr.className = "part-header";
      var k = document.createElement("span");
      k.className = "part-kicker";
      k.textContent = p.roman;
      var t = document.createElement("span");
      t.className = "part-title";
      t.textContent = p.title;
      hdr.appendChild(k);
      hdr.appendChild(t);
      li.parentNode.insertBefore(hdr, li);
    });
  });
</script>

<!-- Right-panel "Downloads" section, injected above View source / Edit this page -->
<script>
  document.addEventListener("DOMContentLoaded", function () {
    var bookExtra = document.querySelector(".book-extra");
    if (!bookExtra || document.querySelector(".book-downloads")) return;

    var current = window.location.pathname.split("/").pop() || "index.html";
    var chapterPdf = current.replace(/\.html$/, ".pdf");
    var isLanding = current === "" || current === "index.html";

    var wrap = document.createElement("div");
    wrap.className = "book-downloads";

    var heading = document.createElement("h6");
    heading.className = "book-downloads-heading";
    heading.textContent = "Downloads";
    wrap.appendChild(heading);

    var list = document.createElement("ul");
    list.className = "list-unstyled";

    var liBook = document.createElement("li");
    var aBook = document.createElement("a");
    aBook.id = "book-download-full";
    aBook.href = "methods-in-r.pdf";
    aBook.textContent = "Entire book (PDF) ";
    var iconBook = document.createElement("i");
    iconBook.className = "fa-solid fa-book";
    aBook.appendChild(iconBook);
    liBook.appendChild(aBook);
    list.appendChild(liBook);

    if (!isLanding) {
      var liChapter = document.createElement("li");
      var aChapter = document.createElement("a");
      aChapter.id = "book-download-chapter";
      aChapter.href = "pdf-chapters/" + chapterPdf;
      aChapter.textContent = "This chapter (PDF) ";
      var iconCh = document.createElement("i");
      iconCh.className = "fa-solid fa-file-pdf";
      aChapter.appendChild(iconCh);
      liChapter.appendChild(aChapter);
      list.appendChild(liChapter);
    }

    wrap.appendChild(list);
    bookExtra.parentNode.insertBefore(wrap, bookExtra);
  });
</script>
