<script>
  document.addEventListener("DOMContentLoaded", function () {
    var file = window.location.pathname.split("/").pop().replace(".html", ".pdf");
    if (!file || file === ".pdf") return;
    var btn = document.createElement("a");
    btn.href = "pdf-chapters/" + file;
    btn.className = "btn btn-sm btn-outline-secondary per-chapter-pdf-btn";
    btn.style.cssText = "float:right;margin-top:0.5em;";
    btn.textContent = "⬇ Download this chapter (PDF)";
    var header = document.querySelector("main h1");
    if (header && !document.querySelector(".per-chapter-pdf-btn")) {
      header.appendChild(btn);
    }
  });
</script>
