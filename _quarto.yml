project:
  type: book
  output-dir: docs

book:
  title: "Methods in R"
  subtitle: "A Topic Reference for Biomedical Research and Peer Review"
  author:
    name: "R. Heller"
    orcid: "0000-0001-8006-9742"
  date: today
  description: "A bench reference for biomedical authors and peer reviewers — every common method covered with R code, diagnostics, and reviewer-facing red flags."
  site-url: https://r-heller.github.io/methods-in-r/
  repo-url: https://github.com/r-heller/methods-in-r/
  repo-actions: [edit, source, issue]
  search: true
  page-navigation: true
  back-to-top-navigation: true
  downloads: [pdf]
  sidebar:
